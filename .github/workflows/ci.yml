name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python }}

      - name: Run pytest
        run: uv run --python ${{ matrix.python }} pytest tests/ -v

      - name: Ruff check
        run: uv run --python ${{ matrix.python }} ruff check .

      - name: Ruff format check
        run: uv run --python ${{ matrix.python }} ruff format --check .

  dogfood:
    name: Dogfood (own hooks on own repo)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Tier 1 — security_hook on changed files
        run: |
          set -euo pipefail
          if [ -n "${{ github.base_ref }}" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            CHANGED=$(git diff --name-only "$BASE_REF...HEAD" || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD || true)
          fi

          FAILED=0
          for f in $CHANGED; do
            [ -f "$f" ] || continue
            case "$f" in
              *.py|*.go|*.ts|*.tsx|*.js|*.jsx) ;;
              *) continue ;;
            esac

            ABS="$(pwd)/$f"
            PAYLOAD=$(python3 -c "import json,sys; print(json.dumps({'tool_name':'Edit','tool_input':{'file_path':sys.argv[1]},'cwd':sys.argv[2]}))" "$ABS" "$(pwd)")
            RESULT=$(printf '%s' "$PAYLOAD" | uv run --script hooks/security_hook.py)

            DECISION=$(printf '%s' "$RESULT" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); print(d.get('decision',''))")
            if [ "$DECISION" = "block" ]; then
              echo "::error file=$f::Tier 1 (V08) security violation"
              printf '%s\n' "$RESULT" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); print(d.get('reason',''))"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "Tier 1: all changed files clean"

      - name: Tier 3 — full-project stop_validator
        run: |
          set -euo pipefail
          PAYLOAD=$(python3 -c "import json,sys; print(json.dumps({'cwd':sys.argv[1]}))" "$(pwd)")
          RESULT=$(printf '%s' "$PAYLOAD" | uv run --script hooks/stop_validator.py)

          DECISION=$(printf '%s' "$RESULT" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); print(d.get('decision','approve'))")
          echo "Tier 3 decision: $DECISION"

          if [ "$DECISION" = "block" ]; then
            printf '%s\n' "$RESULT" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); print('REASON:'); print(d.get('reason','')); print(); print('CONTEXT:'); print(d.get('additionalContext',''))"
            echo "::error::Tier 3 (stop_validator) blocked the build"
            exit 1
          fi
          echo "Tier 3: project clean"
